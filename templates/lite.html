<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户录入系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .app-header h1 { font-size: 20px; }
        .app-header .user-info { font-size: 14px; opacity: 0.9; display: flex; align-items: center; gap: 10px; }
        .app-header .user-info a { color: white; text-decoration: underline; cursor: pointer; font-size: 13px; }

        .nav-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 24px;
        }
        .nav-tabs button {
            padding: 12px 20px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .nav-tabs button:hover { color: #667eea; background: #f8f9ff; }
        .nav-tabs button.active { color: #667eea; border-bottom-color: #667eea; }

        .tab-content { padding: 20px 24px; display: none; }
        .tab-content.active { display: block; }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 17px; margin-bottom: 14px; color: #444; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }

        .btn {
            display: inline-block;
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #d68910; }
        .btn-outline { background: white; border: 1px solid #ddd; color: #555; }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 10px;
        }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { resize: vertical; min-height: 100px; }

        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table th {
            background: #f8f9fa;
            padding: 9px 10px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
            white-space: nowrap;
        }
        table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }
        table tr:hover { background: #f8f9ff; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 400px;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        .welcome-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
        }
        .welcome-section h2 { font-size: 22px; margin-bottom: 6px; color: white; }
        .welcome-section p { opacity: 0.85; font-size: 14px; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h2 { margin-bottom: 14px; font-size: 18px; }

        .history-empty {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .history-empty .icon { font-size: 40px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>📝 客户录入系统</h1>
        <div class="user-info">
            <span id="usernameDisplay"></span>
            <a id="logoutBtn">退出</a>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="active" data-tab="tab-add">➕ 添加客户</button>
        <button data-tab="tab-dashboard">📊 概览</button>
        <button data-tab="tab-history">📜 查重历史</button>
    </div>

    <!-- Tab: 添加客户 -->
    <div id="tab-add" class="tab-content active">
        <div class="welcome-section">
            <h2>👋 欢迎使用客户录入系统</h2>
            <p>添加客户时系统会自动检测姓名或电话是否重复</p>
        </div>
        <div class="card">
            <h2>添加新客户</h2>
            <form id="addForm">
                <div class="form-row">
                    <div class="form-group"><label>姓名</label><input type="text" id="cName" placeholder="输入客户姓名（姓名与电话任填一项）"></div>
                    <div class="form-group"><label>电话</label><input type="text" id="cPhone" placeholder="输入电话号码" oninput="detectCountry(this.value)"></div>
                    <div id="phoneCountryResult" style="font-size:12px; margin-top:-6px; margin-bottom:6px; min-height:18px;"></div>
                    <div class="form-group"><label>公司</label><input type="text" id="cCompany" placeholder="输入公司名称"></div>
                </div>
                <div class="form-group"><label>备注 (可选)</label><input type="text" id="cNotes" placeholder="备注信息"></div>
                <div class="form-group"><label>查重内容</label><textarea id="cContent" placeholder="输入需要查重的文本内容"></textarea></div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">添加客户</button>
            </form>
            <div id="addResult" style="margin-top:12px;"></div>
        </div>
    </div>

    <!-- Tab: 概览 -->
    <div id="tab-dashboard" class="tab-content">
        <div class="welcome-section">
            <h2>📊 数据概览</h2>
            <p>查看客户总量和查重情况</p>
        </div>
        <div class="stats-grid" id="liteStats">
            <div class="stat-card"><div class="number" id="totalCust">-</div><div class="label">客户总数</div></div>
            <div class="stat-card"><div class="number" id="todayNew">-</div><div class="label">今日新增</div></div>
            <div class="stat-card"><div class="number" id="weekNew">-</div><div class="label">本周新增</div></div>
            <div class="stat-card"><div class="number" id="monthNew">-</div><div class="label">本月新增</div></div>
            <div class="stat-card"><div class="number" id="todayChecks">-</div><div class="label">今日查重</div></div>
            <div class="stat-card"><div class="number" id="totalChecks">-</div><div class="label">总查重次数</div></div>
        </div>
        <div class="card">
            <h2>快速操作</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="switchTab('tab-add')">➕ 添加客户</button>
                <button class="btn btn-primary" onclick="switchTab('tab-history')">📜 查看历史</button>
            </div>
        </div>
    </div>

    <!-- Tab: 查重历史 -->
    <div id="tab-history" class="tab-content">
        <div class="welcome-section">
            <h2>📜 查重历史</h2>
            <p>查看最近的客户查重记录</p>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:14px;">
                <h2 style="margin:0;">历史记录</h2>
                <button class="btn btn-sm btn-outline" onclick="loadHistory()">🔄 刷新</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>客户</th>
                            <th>对比对象</th>
                            <th>相似度</th>
                            <th>等级</th>
                        </tr>
                    </thead>
                    <tbody id="historyTbody"></tbody>
                </table>
            </div>
            <div id="historyEmpty" class="history-empty" style="display:none;">
                <div class="icon">📭</div>
                <p>暂无查重历史</p>
            </div>
        </div>
    </div>

    <!-- 去重弹窗 -->
    <div class="modal-overlay" id="duplicateModal">
        <div class="modal">
            <h2>⚠️ 检测到重复客户</h2>
            <p style="color:#e67e22; margin-bottom:12px;">以下客户与您输入的姓名或电话重复：</p>
            <div id="duplicateList" style="max-height:250px; overflow-y:auto;"></div>
            <div class="form-actions" style="margin-top:16px;">
                <button class="btn btn-warning" id="forceAddBtn">仍然添加</button>
                <button class="btn btn-outline" onclick="closeDupModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========== Auth ==========
        checkAuth();
        async function checkAuth() {
            try {
                const res = await fetch('/api/customers?page=1&per_page=1');
                if (res.status === 401) window.location.href = '/login';
            } catch { window.location.href = '/login'; }
        }
        document.getElementById('logoutBtn').onclick = async () => {
            await fetch('/logout');
            window.location.href = '/login';
        };

        // ========== Tab ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'tab-dashboard') loadDashboard();
            if (tabId === 'tab-history') loadHistory();
        }
        document.querySelectorAll('.nav-tabs button').forEach(btn => {
            btn.onclick = () => switchTab(btn.dataset.tab);
        });

        // ========== Toast ==========
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ========== 添加客户 ==========
        window._pendingFormData = null;

        // 电话归属地检测（输入时自动查询）
        let detectTimeout;
        function detectCountry(phone) {
            const resultEl = document.getElementById('phoneCountryResult');
            // 至少4位数字才开始检测
            const digits = phone.replace(/[^\d+]/g, '');
            if (digits.length < 4) {
                resultEl.innerHTML = '';
                return;
            }
            clearTimeout(detectTimeout);
            detectTimeout = setTimeout(async () => {
                resultEl.innerHTML = '<span style="color:#999;">🔍 检测中...</span>';
                try {
                    const res = await fetch('/api/phone-lookup', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({phone: phone})
                    });
                    const data = await res.json();
                    if (data.valid && data.country) {
                        let info = '📍 ' + data.country;
                        if (data.carrier) info += ' • ' + data.carrier;
                        if (data.region) info += ' • ' + data.region;
                        resultEl.innerHTML = '<span style="color:#27ae60;">✅ ' + info + '</span>';
                    } else if (data.valid === false) {
                        resultEl.innerHTML = '<span style="color:#e74c3c;">❌ 无法识别</span>';
                    } else {
                        resultEl.innerHTML = '<span style="color:#999;">📍 ' + data.country + '</span>';
                    }
                } catch {
                    resultEl.innerHTML = '<span style="color:#e74c3c;">❌ 查询失败</span>';
                }
            }, 600);
        }

        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('cName').value.trim(),
                phone: document.getElementById('cPhone').value.trim(),
                company: document.getElementById('cCompany').value.trim(),
                notes: document.getElementById('cNotes').value.trim(),
                content: document.getElementById('cContent').value
            };
            if (!data.name && !data.phone) {
                showToast('姓名和电话至少填一项', 'error');
                return;
            }
            try {
                const res = await fetch('/api/customers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.ok) {
                    showToast('✅ 客户添加成功');
                    document.getElementById('addForm').reset();
                } else if (result.duplicate_warning) {
                    window._pendingFormData = data;
                    showDupModal(result.duplicates);
                } else {
                    showToast(result.error || '添加失败', 'error');
                }
            } catch { showToast('网络错误', 'error'); }
        };

        // ========== 去重弹窗 ==========
        function showDupModal(duplicates) {
            const list = document.getElementById('duplicateList');
            let html = '<table style="font-size:13px; width:100%;"><thead><tr><th>姓名</th><th>电话</th><th>公司</th><th>匹配字段</th></tr></thead><tbody>';
            duplicates.forEach(d => {
                html += '<tr><td>' + d.name + '</td><td>' + (d.phone || '-') + '</td><td>' + (d.company || '-') + '</td><td>' + d.field + '</td></tr>';
            });
            html += '</tbody></table>';
            list.innerHTML = html;
            document.getElementById('duplicateModal').classList.add('show');
        }

        document.getElementById('forceAddBtn').onclick = async () => {
            const data = window._pendingFormData;
            if (!data) return;
            try {
                const res = await fetch('/api/customers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({...data, force_add: true})
                });
                const result = await res.json();
                if (result.ok) {
                    showToast('✅ 客户添加成功（已忽略重复）');
                    document.getElementById('addForm').reset();
                    closeDupModal();
                    window._pendingFormData = null;
                } else {
                    showToast(result.error || '添加失败', 'error');
                    closeDupModal();
                }
            } catch {
                showToast('网络错误', 'error');
                closeDupModal();
            }
        };

        function closeDupModal() {
            document.getElementById('duplicateModal').classList.remove('show');
        }

        // ========== 概览 ==========
        async function loadDashboard() {
            try {
                const res = await fetch('/api/analytics/overview');
                const d = await res.json();
                document.getElementById('totalCust').textContent = d.total_customers;
                document.getElementById('todayNew').textContent = d.today_new;
                document.getElementById('weekNew').textContent = d.week_new;
                document.getElementById('monthNew').textContent = d.month_new;
                document.getElementById('todayChecks').textContent = d.today_checks;
                document.getElementById('totalChecks').textContent = d.total_checks;
            } catch {}
        }

        // ========== 查重历史 ==========
        async function loadHistory() {
            try {
                const res = await fetch('/api/history?limit=50');
                const data = await res.json();
                const tbody = document.getElementById('historyTbody');
                const empty = document.getElementById('historyEmpty');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                data.forEach(h => {
                    const tr = document.createElement('tr');
                    const nameA = h.c1_name || 'ID:' + h.customer1_id;
                    const nameB = h.c2_name ? h.c2_name : (h.customer2_id ? 'ID:' + h.customer2_id : '自定义文本');
                    const phoneA = h.c1_phone ? '(' + h.c1_phone + ')' : '';
                    const phoneB = h.c2_phone ? '(' + h.c2_phone + ')' : '';
                    tr.innerHTML = [
                        '<td>' + h.checked_at + '</td>',
                        '<td>' + nameA + ' ' + phoneA + '</td>',
                        '<td>' + nameB + ' ' + phoneB + '</td>',
                        '<td><strong>' + h.similarity + '%</strong></td>',
                        '<td>' + h.level + '</td>'
                    ].join('');
                    tbody.appendChild(tr);
                });
            } catch { showToast('加载历史失败', 'error'); }
        }

        // ========== Init ==========
        // Just load dashboard on page load
    </script>
</body>
</html>
